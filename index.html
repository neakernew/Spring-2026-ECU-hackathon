<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock Paper Scissor's Game</title>
  <link rel="icon" type="image/png" href="logo.png">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header><h1>Rock Paper Scissors</h1></header>
    <div id="score">
        <h2>Score</h2>
        <table id="data">
            <tr>
                <th>Computer</th>
                <th>You</th>
            </tr>
            <tr>
                <td id="comScore"></td>
                <td id="userScore"></td>
            </tr>
        </table>
    </div>

    <p id="decision"></p>

    <div id="image-stage">
        <div id="images">
            <img id="rock" src="rock.png" alt="Rock">
            <img id="paper" src="paper.png" alt="Paper">
            <img id="scissors" src="scissors.png" alt="Scissors">
        </div>

        <div id="reveal" class="hidden">
            <div class="reveal-card">
                <p>Player</p>
                <img id="playerReveal" src="" alt="Player choice">
            </div>

            <div class="reveal-card">
                <p>Computer</p>
                <img id="computerReveal" src="" alt="Computer choice">
            </div>
        </div>
    </div>

    <div id="options">
    </div>

    

    <script src="gameOptions.js" defer></script>
</body>
</html>
